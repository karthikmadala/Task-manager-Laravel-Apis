services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-portfolio-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-crypto_portfolio}
      DB_USERNAME: ${DB_USERNAME:-crypto_user}
      DB_PASSWORD: ${DB_PASSWORD:-crypto_password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t && php artisan route:list > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  queue-worker:
    image: crypto-portfolio-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-crypto_portfolio}
      DB_USERNAME: ${DB_USERNAME:-crypto_user}
      DB_PASSWORD: ${DB_PASSWORD:-crypto_password}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  apache:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_started
    volumes:
      - storage_data:/var/www/html/storage

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crypto_portfolio}
      MYSQL_USER: ${DB_USERNAME:-crypto_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-crypto_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  storage_data:
  bootstrap_cache:
